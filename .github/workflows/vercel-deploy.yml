name: vercel-deploy

on:
  workflow_dispatch:
  workflow_run:
    workflows: ["ci"]
    types: [completed]
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Setup Vercel project link
        run: |
          mkdir -p .vercel
          echo '{"orgId":"team_HCFohEhWeRbk5gTvqF5idqyU","projectId":"prj_a1ETMXMCCY6HZ6OCZsiszHjU7qWn"}' > .vercel/project.json
      - run: npx vercel deploy --prod --yes --token=${{ secrets.VERCEL_TOKEN }}
