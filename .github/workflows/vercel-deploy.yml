name: vercel-deploy

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx vercel deploy --prod --yes --token=${{ secrets.VERCEL_TOKEN }} --scope=atsuhiro-takagis-projects
