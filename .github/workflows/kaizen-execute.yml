# ── カイゼン実行ワークフロー（対象システムを実際に直す） ──
# kaizen-mado の /api/execute から repository_dispatch(event_type: kaizen_execute) で起動。
# client_payload を受けて、対象リポを Claude で改修 → PR作成 → callback。
# 【PRレビュー型】AIはPRを作るところまで。本番マージは人（社長）が差分を見て1クリック。
#
# 必要なシークレット:
#   ANTHROPIC_API_KEY   … Claude 実装用
#   TARGET_REPO_PAT     … 対象リポ(tkgathr2/*)へ push / PR できる PAT（repo, workflow スコープ）
#   CRON_SECRET         … kaizen-mado /api/execute/callback の認証（kaizen-mado と同値）
#
# 安全：AIは本番に自動マージしない。差分が小さく安全でも必ずPRで止め、人がレビューしてマージ。
# Post-gate は参考情報（差分行数・禁止パス接触）をPR本文に残すために使う。
name: kaizen-execute

on:
  repository_dispatch:
    types: [kaizen_execute]

# 同時実行は1チケット1本に直列化（取り違え防止）。
concurrency:
  group: kaizen-execute-${{ github.event.client_payload.ticketId }}
  cancel-in-progress: false

jobs:
  execute:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      TICKET_ID: ${{ github.event.client_payload.ticketId }}
      PAGE_ID: ${{ github.event.client_payload.pageId }}
      SYSTEM: ${{ github.event.client_payload.system }}
      TARGET_REPO: ${{ github.event.client_payload.targetRepo }}
      HEALTH_URL: ${{ github.event.client_payload.healthUrl }}
      CALLBACK_URL: ${{ github.event.client_payload.callbackUrl }}
      SPEC: ${{ github.event.client_payload.spec }}
      FORBIDDEN: ${{ join(github.event.client_payload.forbiddenPaths, ',') }}
    steps:
      - name: Checkout target repo
        uses: actions/checkout@v4
        with:
          repository: ${{ env.TARGET_REPO }}
          token: ${{ secrets.TARGET_REPO_PAT }}
          fetch-depth: 0

      - name: Create work branch
        id: branch
        run: |
          BR="kaizen/${TICKET_ID,,}-$(date +%s)"
          git config user.name "kaizen-bot"
          git config user.email "kaizen-bot@users.noreply.github.com"
          git checkout -b "$BR"
          echo "branch=$BR" >> "$GITHUB_OUTPUT"

      - name: Implement with Claude
        uses: anthropics/claude-code-base-action@beta
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            次の「カイゼン実装指示」に従って、このリポジトリに最小差分の変更を加えてください。
            禁止パス（${{ env.FORBIDDEN }}）には触れないでください。テスト・型・lintを壊さないこと。
            変更後はビルド/テストが通る状態にしてください。

            ${{ env.SPEC }}

      - name: Post-gate（3条件のうち diff行数・禁止パスを判定）
        id: gate
        run: |
          git add -A
          # 変更が無ければ failed 扱い
          if git diff --cached --quiet; then
            echo "verdict=failed" >> "$GITHUB_OUTPUT"
            echo "detail=変更が生成されませんでした" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          LINES=$(git diff --cached --numstat | awk '{a+=$1; d+=$2} END {print a+d}')
          echo "diff lines: $LINES"
          TOUCHED=$(git diff --cached --name-only)
          HIT=""
          IFS=',' read -ra PATHS <<< "$FORBIDDEN"
          for p in "${PATHS[@]}"; do
            [ -z "$p" ] && continue
            if echo "$TOUCHED" | grep -qi -- "$p"; then HIT="$HIT $p"; fi
          done
          if [ -n "$HIT" ]; then
            echo "verdict=review" >> "$GITHUB_OUTPUT"
            echo "detail=禁止パス接触:$HIT" >> "$GITHUB_OUTPUT"
          elif [ "${LINES:-0}" -ge 50 ]; then
            echo "verdict=review" >> "$GITHUB_OUTPUT"
            echo "detail=差分が大きい（${LINES}行 >= 50）" >> "$GITHUB_OUTPUT"
          else
            echo "verdict=auto" >> "$GITHUB_OUTPUT"
            echo "detail=diff ${LINES}行・禁止パス非接触" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit & push & PR
        id: pr
        if: steps.gate.outputs.verdict == 'auto' || steps.gate.outputs.verdict == 'review'
        env:
          GH_TOKEN: ${{ secrets.TARGET_REPO_PAT }}
          # ${{ }} は env で受けてから $VAR で使う（run内への直接展開＝シェルインジェクションを避ける）
          DETAIL: ${{ steps.gate.outputs.detail }}
          BRANCH: ${{ steps.branch.outputs.branch }}
        run: |
          git commit -q -m "fix(kaizen): ${TICKET_ID} 自動改修

          ${DETAIL}"
          git push -u origin "$BRANCH"
          PR_URL=$(gh pr create --repo "$TARGET_REPO" \
            --head "$BRANCH" \
            --title "fix(kaizen): ${TICKET_ID} 自動改修" \
            --body "カイゼンくん自動改修（${TICKET_ID}）。判定: ${DETAIL}")
          echo "url=$PR_URL" >> "$GITHUB_OUTPUT"

      # ── PRレビュー型：本番への自動マージ・自動デプロイはしない ──
      # AIが直してPRを作るところまで。マージ＝本番反映は人（社長）が差分を見て1クリック。
      # （将来フル自動へ昇格する場合のみ、ここに gh pr merge ＋ヘルス確認のステップを足す）

      - name: Callback to kaizen-mado（PRレビュー型）
        if: always()
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          GATE_VERDICT: ${{ steps.gate.outputs.verdict }}
          PR_URL: ${{ steps.pr.outputs.url }}
          DETAIL: ${{ steps.gate.outputs.detail }}
        run: |
          # PRが作れたら必ず review（人のレビュー待ち・PR URL付き）。変更ゼロ/失敗は failed。
          if [ "$GATE_VERDICT" = "failed" ] || [ -z "$PR_URL" ]; then
            RESULT="failed"
          else
            RESULT="review"
          fi
          curl -s -X POST "$CALLBACK_URL" \
            -H "content-type: application/json" \
            -H "x-cron-secret: $CRON_SECRET" \
            -d "$(jq -n --arg t "$TICKET_ID" --arg p "$PAGE_ID" --arg s "$SYSTEM" \
                   --arg r "$RESULT" --arg u "$PR_URL" --arg d "$DETAIL" \
                   '{ticketId:$t,pageId:$p,system:$s,result:$r,prUrl:$u,detail:$d}')"
