name: fix-cron-secret
on:
  workflow_dispatch:
jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: VercelのCRON_SECRETをGHと同じ値に更新
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          RES=$(curl -s "https://api.vercel.com/v9/projects/kaizen-mado/env?teamId=team_HCFohEhWeRbk5gTvqF5idqyU" \
            -H "Authorization: Bearer ${VERCEL_TOKEN}")
          ENV_ID=$(echo "$RES" | python3 -c "
import sys,json
d=json.load(sys.stdin)
e=next((x for x in d.get('envs',[]) if x.get('key')=='CRON_SECRET'),{})
print(e.get('id',''))
" 2>/dev/null || echo "")
          echo "CRON_SECRET env id: $ENV_ID"
          if [ -z "$ENV_ID" ]; then
            echo "新規追加"
            curl -s -X POST "https://api.vercel.com/v9/projects/kaizen-mado/env?teamId=team_HCFohEhWeRbk5gTvqF5idqyU" \
              -H "Authorization: Bearer ${VERCEL_TOKEN}" \
              -H "Content-Type: application/json" \
              -d "[{\"key\":\"CRON_SECRET\",\"value\":\"${CRON_SECRET}\",\"type\":\"encrypted\",\"target\":[\"production\",\"preview\",\"development\"]}]"
          else
            echo "既存更新"
            curl -s -X PATCH "https://api.vercel.com/v9/projects/kaizen-mado/env/${ENV_ID}?teamId=team_HCFohEhWeRbk5gTvqF5idqyU" \
              -H "Authorization: Bearer ${VERCEL_TOKEN}" \
              -H "Content-Type: application/json" \
              -d "{\"value\":\"${CRON_SECRET}\"}"
          fi
          echo "Vercel CRON_SECRET更新完了"

      - name: 再デプロイ（新env反映）
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          LATEST=$(curl -s "https://api.vercel.com/v6/deployments?projectId=prj_a1ETMXMCCY6HZ6OCZsiszHjU7qWn&teamId=team_HCFohEhWeRbk5gTvqF5idqyU&target=production&limit=1" \
            -H "Authorization: Bearer ${VERCEL_TOKEN}" | python3 -c "
import sys,json
d=json.load(sys.stdin)
print(d.get('deployments',[{}])[0].get('uid',''))
")
          curl -s -X POST "https://api.vercel.com/v13/deployments?teamId=team_HCFohEhWeRbk5gTvqF5idqyU&forceNew=1" \
            -H "Authorization: Bearer ${VERCEL_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "{\"name\":\"kaizen-mado\",\"deploymentId\":\"${LATEST}\",\"target\":\"production\"}" | python3 -c "
import sys,json
d=json.load(sys.stdin)
print('Deploy:', d.get('url',''), 'State:', d.get('readyState',''))
"
